version: '3.8'

services:
  # ВАШ FRONTEND
  frontend:
    build: .
    container_name: art-museum-frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx-logs:/var/log/nginx   # Сохраняем логи Nginx
    restart: unless-stopped

  # СБОР ЛОГОВ
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yaml:/etc/promtail/config.yaml
      - ./nginx-logs:/var/log/nginx:ro   # Читаем логи Nginx
    command: --config.file=/etc/promtail/config.yaml

  # ХРАНИЛИЩЕ ЛОГОВ
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki

  # СБОР МЕТРИК
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus-config.yaml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  # ЭКСПОРТЕР МЕТРИК ДЛЯ NGINX
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    command: -nginx.scrape-uri http://frontend:80/stub_status
    ports:
      - "9113:9113"

  # ВИЗУАЛИЗАЦИЯ
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_INSTALL_PLUGINS=grafana-lokiexplorer-app  # Плагин для логов

volumes:
  loki_data:
  prometheus_data:
  grafana_data: