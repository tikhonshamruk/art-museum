name: Demo Workflow

on: push
jobs:
  test:
   runs-on: ubuntu-latest
   steps:
     - name: Get repository code
       uses: actions/checkout@4

     - name: Setup Node.js
       uses: actions/setup-node@v4
       with: 
        node-version: '20'
        cache: 'npm'
        
     - name: Install dependencies
       run: npm ci

     - name: Run linter
       run: npm run lint

     - name: Run tests
       run: npm test -- --watch=false --browsers=ChromeHeadless   
            
  build:
    runs-on: ubuntu-latest
    needs: test                       # Билд запустится только после успешного test
    steps:
      - name: Get repository code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build            # ng build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/      
     
